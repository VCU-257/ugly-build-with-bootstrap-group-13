<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mork Borg Character Creation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <form action="CharacterSuccess.html">
        <div class="mb-4">
          <h1 class="display-5 fw-bold">Mork Borg Character Creation</h1>
          <p class="lead mb-0">Build a doomed soul for the dying world.</p>
        </div>

        <div class="alert alert-dark" role="alert">
          Use this page to fill out a basic Mork Borg character sheet. This is a static Bootstrap layout only.
        </div>

        <div class="card mb-4">
          <div class="card-header">
            Character Basics
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="characterName" class="form-label">Character Name</label>
                <input type="text" class="form-control" id="characterName" placeholder="Gutter Saint">
              </div>
              <div class="col-md-6">
                <label for="className" class="form-label">Class</label>
                <select id="className" class="form-select">
                  <option selected>Choose a class</option>
                  <option>Fanged Deserter</option>
                  <option>Gutterborn Scum</option>
                  <option>Esoteric Hermit</option>
                  <option>Wretched Royalty</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="homeland" class="form-label">Origin</label>
                <input type="text" class="form-control" id="homeland" placeholder="Bergen Chrypt">
              </div>
              <div class="col-md-4">
                <label for="trait" class="form-label">Notable Trait</label>
                <input type="text" class="form-control" id="trait" placeholder="Nervous eyes">
              </div>
              <div class="col-md-4">
                <label for="omen" class="form-label">Omen</label>
                <input type="number" class="form-control" id="omen" placeholder="2">
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header">
            Abilities
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-sm-6 col-lg-3">
                <label for="strength" class="form-label">Strength</label>
                <input type="number" class="form-control" id="strength" placeholder="0">
              </div>
              <div class="col-sm-6 col-lg-3">
                <label for="agility" class="form-label">Agility</label>
                <input type="number" class="form-control" id="agility" placeholder="0">
              </div>
              <div class="col-sm-6 col-lg-3">
                <label for="presence" class="form-label">Presence</label>
                <input type="number" class="form-control" id="presence" placeholder="0">
              </div>
              <div class="col-sm-6 col-lg-3">
                <label for="toughness" class="form-label">Toughness</label>
                <input type="number" class="form-control" id="toughness" placeholder="0">
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header">
            Combat and Survival
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label for="hp" class="form-label">Hit Points</label>
                <input type="number" class="form-control" id="hp" placeholder="8">
              </div>
              <div class="col-md-3">
                <label for="glitched" class="form-label">Glitched</label>
                <input type="number" class="form-control" id="glitched" placeholder="0">
              </div>
              <div class="col-md-3">
                <label for="armor" class="form-label">Armor Tier</label>
                <select id="armor" class="form-select">
                  <option selected>None</option>
                  <option>Light</option>
                  <option>Medium</option>
                  <option>Heavy</option>
                </select>
              </div>
              <div class="col-md-3">
                <label for="silver" class="form-label">Silver</label>
                <input type="number" class="form-control" id="silver" placeholder="30">
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header">
            Equipment
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="weapon" class="form-label">Primary Weapon</label>
                <input type="text" class="form-control" id="weapon" placeholder="Rusty blade">
              </div>
              <div class="col-md-6">
                <label for="armorNotes" class="form-label">Armor or Protection</label>
                <input type="text" class="form-control" id="armorNotes" placeholder="Rotting mail">
              </div>
              <div class="col-12">
                <label for="inventory" class="form-label">Starting Inventory</label>
                <textarea class="form-control" id="inventory" rows="4" placeholder="Torches, rope, teeth, and a bad decision."></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header">
            Miserable Details
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="quirk" class="form-label">Quirk</label>
                <textarea class="form-control" id="quirk" rows="3" placeholder="Describe what makes this character strange."></textarea>
              </div>
              <div class="col-md-6">
                <label for="background" class="form-label">Dark Background</label>
                <textarea class="form-control" id="background" rows="3" placeholder="Write a short Mork Borg backstory."></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex flex-column flex-md-row gap-2 justify-content-end">
          <button type="reset" class="btn btn-outline-secondary">Reset Sheet</button>
          <button type="submit" class="btn btn-dark">Save Character</button>
        </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
