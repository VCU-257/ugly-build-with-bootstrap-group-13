<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeroForge</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container">

      <!-- Logo -->
      <a class="navbar-brand fw-bold" href="#">HeroForge</a>

      <!-- Hamburger Button -->
      <button class="navbar-toggler" type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#mobileMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Desktop Nav -->
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Character</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Campaign</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Customize</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Library</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Account</a></li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- Offcanvas Mobile Menu -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Character</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Campaign</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Customize</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Library</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Account</a></li>
      </ul>
    </div>
  </div>

  <!-- Home Content -->
  <main class="container py-5 text-center">
    <h1 class="display-5 fw-bold">Build Your Hero</h1>
    <p class="lead">Create and manage your characters easily.</p>

    <a href="#" class="btn btn-primary btn-lg mt-3">Create Character</a>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
